<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic Admin | Empleados</title>
    <!-- Icons -->
    <link rel="apple-touch-icon" href="../src/assets/ico/apple-touch-icon.png">
    <link rel="icon" sizes="32x32" href="../src/assets/ico/favicon-32x32.png">
    <link rel="icon" sizes="16x16" href="../src/assets/ico/favicon-16x16.png">
    <link rel="android-chrome-192x192" sizes="192x192" href="../src/assets/ico/android-chrome-192x192.png">
    <link rel="android-chrome-512x512" sizes="512x512" href="../src/assets/ico/android-chrome-512x512.png">
    <!-- Fuentes: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <!-- Fuentes: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet"> 
    <!-- Styles -->
    <link rel="stylesheet" href="../src/styles/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <header>
        <div class="heading">
            <h1>Kinetic Admin</h1>
        </div>
        <div class="icons">
            <i class="fa fa-sign-out" id="logout-btn"></i>
            <i class="fa fa-bell-o" id="notification-btn"></i>
        </div>
    </header>

    <main>
        <div class="search-filter-bar">
            <div class="search-employee">
                <i class="fa fa-search"></i>
                <input type="text" name="search-bar" id="search-bar" placeholder="Buscar empleado...">
            </div>
            <nav class="filter-buttons" id="filterButtons">
                <button type="button" class="filter-buttons-btn is-active" data-filter="all">TODOS</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_a">A</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_b">B</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_c">C</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_d">D</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_e">E</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_f">F</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_g">G</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_h">H</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_i">I</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_j">J</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_k">K</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_l">L</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_m">M</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_n">N</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_ñ">Ñ</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_o">O</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_p">P</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_q">Q</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_r">R</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_s">S</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_t">T</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_u">U</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_v">V</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_w">W</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_x">X</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_y">Y</button>
                <button type="button" class="filter-buttons-btn" data-filter="name_z">Z</button>
            </nav>
        </div>
        <div>
            <h2>Directorio de empleados</h2>
        </div>
        <div class="employees-gallery" id="employeesGallery"></div>
    </main>

    <footer>
        <nav class="footer-navbar">
            <button type="button">
                <i class="fa fa-th-large"></i>
                <span>Dashboard</span>
            </button>
            <button type="button">
                <i class="fa fa-users"></i>
                <span>Users</span>
            </button>
            <button type="button">
                <i class="fa fa-area-chart"></i>
                <span>Analytics</span>
            </button>
            <button type="button">
                <i class="fa fa-user"></i>
                <span>User</span>
            </button>
            <!-- <div>
                <i class="fa fa-th-large"></i>
                <button>Dashboard</button>
            </div>
            <div>
                <i class="fa fa-users"></i>
                <button>Users</button>
            </div>
            <div>
                <i class="fa fa-area-chart"></i>
                <button>Analytics</button>
            </div>
            <div>
                <i class="fa fa-user-o"></i>
                <button>Profile</button>
            </div>             -->
        </nav>
    </footer>
    <script type="module" src="../src/scripts/employees-gallery/main.js"></script>
    <script src="../src/scripts/logout/logout.js"></script>
</body>
</html>
